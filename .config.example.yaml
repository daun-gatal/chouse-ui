# ============================================
# CHouse UI YAML Configuration Example
# ============================================
# Copy this file to .config.yaml and update with your values
# Set CHOUSE_CONFIG_PATH=./.config.yaml to use this file.
#
# For production, generate secure secrets using:
#   jwt.secret: openssl rand -base64 32
#   rbac.encryption.key: openssl rand -hex 32
#   rbac.encryption.salt: openssl rand -hex 32

# ============================================
# Core Server Settings
# ============================================
port: 5521
# version is set automatically by the build; override only for custom builds
# version: "dev"
node_env: development
static_path: ./dist
cors_origin: "*"
# Server log level: debug | info | warn | error (JSON logs via Pino)
log_level: debug

# ============================================
# RBAC Database Configuration
# ============================================
rbac:
  # Database type: 'sqlite' (default) or 'postgres'
  db_type: sqlite

  # SQLite configuration (used when rbac.db_type is sqlite)
  sqlite_path: ./data/rbac.db

  # PostgreSQL configuration (used when rbac.db_type is postgres)
  # Example: postgres://user:password@host:5432/dbname
  postgres_url: ""
  postgres_pool_size: 10

  # ============================================
  # Encryption
  # ============================================
  encryption:
    # Encryption key for ClickHouse connection passwords (REQUIRED in production)
    # Should be 32 bytes in hex (64 characters)
    # Generate with: openssl rand -hex 32
    key: "bd3df1f71df92bce10016e6cdc455b5ab9fa2cc5a72b01ebc1ffb69fe5e3be41"

    # Salt for encryption key derivation (REQUIRED in production)
    # Should be 32 bytes in hex (64 characters)
    # Generate with: openssl rand -hex 32
    salt: "fcb275ea2c4a690357de480baaac0ec895f6e1b63315aee2997d2fd1e62c4f85"

  # ============================================
  # Admin User Seeding
  # ============================================
  # These are only used when creating the initial admin user during first run
  admin:
    email: admin@example.com
    username: admin
    password: Password1!

# ============================================
# ClickHouse Connection Defaults
# ============================================
# Pre-fill the connection form in the UI for faster setup.
clickhouse:
  default_url: ""
  default_user: default
  preset_urls: ""   # comma-separated list of preset URLs

# ============================================
# JWT Authentication
# ============================================
jwt:
  # JWT signing secret (REQUIRED in production)
  # Generate with: openssl rand -base64 32
  secret: your-super-secret-key-change-in-production-min-32-chars!

  # Token expiration times (m: minutes, h: hours, d: days)
  access_expiry: 4h
  refresh_expiry: 7d

  # Optional: override issuer/audience claims
  # issuer: chouseui
  # audience: chouseui-client

# ============================================
# Fleet Monitoring — optional
# ============================================
fleet:
  poller_enabled: false
  poll_interval_seconds: 30
  alert_config_file: /app/data/alert-config.json

# ============================================
# AI SRE / Doctor — optional
# ============================================
doctor:
  schedule_file: /app/data/doctor-schedule.json
  auto_rca_cooldown_minutes: 60

# ============================================
# SSO (OIDC / OAuth2) — optional
# ============================================
# Register this redirect URI at your IdP: <base_url>/auth/sso/callback
auth:
  sso:
    enabled: true
    base_url: http://localhost:5521 # public URL of this app (builds the redirect_uri)
    default_role: viewer # role for JIT-provisioned users
    auto_link_by_email: true # link to existing users when IdP asserts email_verified
    providers:
      #       okta:                                   # provider id used in login URL slug
      #         type: oidc                            # 'oidc' = auto-discovers endpoints from issuer
      #         display_name: "Okta"
      #         issuer: https://corp.okta.com
      #         client_id: "..."
      #         client_secret: "..."
      #         scopes: "openid profile email"
      #         # Optional: sync roles from an IdP claim on every login.
      #         # Note: users holding super_admin are never demoted by role sync.
      #         # role_mapping_claim: groups
      #         # role_mapping: "idp-group-a:admin,idp-group-b:developer"
      google:
        type: oidc                                      # OIDC: auto-discovers endpoints from issuer
        display_name: "Google"
        issuer: https://accounts.google.com
        client_id: "${GOOGLE_CLIENT_ID}"               # set GOOGLE_CLIENT_ID in env or replace here
        client_secret: "${GOOGLE_CLIENT_SECRET}"       # set GOOGLE_CLIENT_SECRET in env or replace here
        scopes: "openid profile email"
        # Optional (OIDC): override individual auto-discovered endpoints if the
        # discovery document is wrong or unreachable. Leave unset to use discovery.
        # authorization_endpoint: https://accounts.google.com/o/oauth2/v2/auth
        # token_endpoint: https://oauth2.googleapis.com/token
        # userinfo_endpoint: https://openidconnect.googleapis.com/v1/userinfo
        # Optional: remap non-standard ID-token claims to subject/email/username.
        # claim_mapping: "subject:sub,email:email,username:name"
        # Optional: extra authorization-request params sent to the IdP. Reserved
        # keys (state, nonce, code_challenge, redirect_uri, scope, ...) are ignored.
        # auth_params: "hd:example.com,prompt:select_account"
      #       acme-oauth2:                              # plain OAuth2 (no OIDC discovery)
      #         type: oauth2
      #         display_name: "Acme"
      #         authorization_endpoint: https://acme.example.com/oauth/authorize
      #         token_endpoint: https://acme.example.com/oauth/token
      #         userinfo_endpoint: https://acme.example.com/oauth/userinfo
      #         client_id: "..."
      #         client_secret: "..."
      #         scopes: "profile email"
      #         # Required for OAuth2: map userinfo fields -> subject/email/username.
      #         claim_mapping: "subject:id,email:email,username:login"
      #         # auth_params: "audience:https://api.acme.example.com"
      #       corp-saml:                               # SAML 2.0 (enterprise IdP: Okta, Entra ID, ADFS, ...)
      #         type: saml
      #         display_name: "Corporate SSO"
      #         saml_idp_entity_id: https://idp.example.com/entity   # IdP entityID (the assertion Issuer)
      #         saml_idp_sso_url: https://idp.example.com/sso         # IdP SSO endpoint (HTTP-Redirect)
      #         saml_sp_entity_id: https://chouse.example.com         # our SP entityID / audience (often the base URL)
      #         # PEM cert the IdP signs assertions with (escape newlines as \n in env, or paste in admin UI):
      #         saml_idp_certificate: "-----BEGIN CERTIFICATE-----\n...\n-----END CERTIFICATE-----"
      #         # saml_nameid_format: urn:oasis:names:tc:SAML:1.1:nameid-format:emailAddress
      #         saml_allow_idp_initiated: false        # IdP-initiated is less secure; off by default
      #         # Map SAML attributes -> user fields and groups -> roles (same as OIDC):
      #         # claim_mapping: "email:email,username:uid"
      #         # role_mapping_claim: groups
      #         # role_mapping: "idp-group-a:admin,idp-group-b:developer"
      #         # Register this ACS URL at the IdP:  https://chouse.example.com/auth/sso/saml/acs
