# ============================================
# CHouse UI YAML Configuration Example
# ============================================
# Copy this file to .config.yaml and update with your values
# Set CHOUSE_CONFIG_PATH=./.config.yaml to use this file.
#
# For production, generate secure secrets using:
#   jwt.secret: openssl rand -base64 32
#   rbac.encryption.key: openssl rand -hex 32
#   rbac.encryption.salt: openssl rand -hex 32

# ============================================
# Core Server Settings
# ============================================
port: 5521
node_env: development
static_path: ./dist
cors_origin: "*"
# Server log level: debug | info | warn | error (JSON logs via Pino)
log_level: debug

# ============================================
# RBAC Database Configuration
# ============================================
rbac:
  # Database type: 'sqlite' (default) or 'postgres'
  db_type: sqlite

  # SQLite configuration (used when rbac.db_type is sqlite)
  sqlite_path: ./data/rbac.db

  # PostgreSQL configuration (used when rbac.db_type is postgres)
  # Example: postgres://user:password@host:5432/dbname
  postgres_url: ""
  postgres_pool_size: 10

  # ============================================
  # Encryption
  # ============================================
  encryption:
    # Encryption key for ClickHouse connection passwords (REQUIRED in production)
    # Should be 32 bytes in hex (64 characters)
    # Generate with: openssl rand -hex 32
    key: "bd3df1f71df92bce10016e6cdc455b5ab9fa2cc5a72b01ebc1ffb69fe5e3be41"

    # Salt for encryption key derivation (REQUIRED in production)
    # Should be 32 bytes in hex (64 characters)
    # Generate with: openssl rand -hex 32
    salt: "fcb275ea2c4a690357de480baaac0ec895f6e1b63315aee2997d2fd1e62c4f85"

  # ============================================
  # Admin User Seeding
  # ============================================
  # These are only used when creating the initial admin user during first run
  admin:
    email: admin@example.com
    username: admin
    password: Password1!

# ============================================
# JWT Authentication
# ============================================
jwt:
  # JWT signing secret (REQUIRED in production)
  # Generate with: openssl rand -base64 32
  secret: your-super-secret-key-change-in-production-min-32-chars!

  # Token expiration times (m: minutes, h: hours, d: days)
  access_expiry: 4h
  refresh_expiry: 7d

# ============================================
# SSO (OIDC / OAuth2) — optional
# ============================================
# Register this redirect URI at your IdP: <base_url>/auth/sso/callback
auth:
  sso:
    enabled: true
    base_url: http://localhost:5521 # public URL of this app (builds the redirect_uri)
    default_role: viewer # role for JIT-provisioned users
    auto_link_by_email: true # link to existing users when IdP asserts email_verified
    providers:
      #       okta:                                   # provider id (login URL slug)
      #         type: oidc                            # 'oidc' = discovery via issuer/.well-known
      #         display_name: "Okta"
      #         issuer: https://corp.okta.com
      #         client_id: "..."
      #         client_secret: "..."
      #         scopes: "openid profile email"
      #         # Optional: sync roles from an IdP claim on every login.
      #         # Note: users holding super_admin are never demoted by role sync.
      #         # role_mapping_claim: groups
      #         # role_mapping: "idp-group-a:admin,idp-group-b:developer"
      google:
        type: oauth2 # plain OAuth2: explicit endpoints + userinfo
        # Caveat: GitHub's /user endpoint returns `email: null` for accounts
        # with a private email, even with the user:email scope, so JIT
        # provisioning may fail. Make an email public on GitHub, or use a
        # provider that exposes email in its userinfo response.
        display_name: "GitHub"
        authorization_endpoint: https://accounts.google.com/o/oauth2/v2/auth
        token_endpoint: https://oauth2.googleapis.com/token
        userinfo_endpoint: https://openidconnect.googleapis.com/v1/userinfo
        client_id: "1***v.apps.googleusercontent.com "
        client_secret: "G****G"
        scopes: "read:user user:email"
        claim_mapping: "subject:id,email:email,username:login"
