#         display_name: "Okta"
#         issuer: https://corp.okta.com
#         client_id: "..."
#         client_secret: "..."
#         scopes: "openid profile email"
#         # Optional: sync roles from an IdP claim on every login.
#         # Note: users holding super_admin are never demoted by role sync.
#         # role_mapping_claim: groups
