name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 2.20.0). Leave empty to auto-compute from fragments."
        required: false
        default: ""

jobs:
  # ── Step 0: build pre-release images for manual testing ───────────────────
  # Derives the would-be version from the changelog fragments (without writing
  # anything) and publishes throwaway images tagged v<version>-pre and
  # preview. Install/test these, then approve the gate on the assemble job
  # to continue the real release.
  prerelease:
    name: Build Pre-release Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: preview

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Check fragments exist
        run: |
          count=$(find changelogs/unreleased -name "*.md" ! -name "README.md" | wc -l | tr -d ' ')
          if [ "$count" = "0" ]; then
            echo "No changelog fragments found. Nothing to release."
            exit 1
          fi
          echo "Found $count fragment(s)."

      - name: Compute target version
        id: version
        run: |
          VERSION=$(bun run scripts/release.ts ${{ inputs.version }} --dry-run | tail -n1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Target release version: $VERSION"

      - name: Compute build date
        id: meta
        run: echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Re-running with the same version overwrites the v<version>-pre tag.
      # Delete the previous pre-release image first so its bytes don't linger as
      # orphaned versions. Manifest-aware (dataaxiom v1.2.2) so it removes only
      # the digests these tags orphan — safe for the multi-arch released tags.
      - name: Delete previous pre-release image
        uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: ${{ github.event.repository.name }}
          delete-tags: v${{ steps.version.outputs.version }}-pre,preview

      # The UI version is read from package.json at frontend build time, so set
      # it to <version>-pre here. The image is not committed — this only affects
      # the bundle baked into the pre-release image.
      - name: Set pre-release version in package.json
        env:
          PREVERSION: ${{ steps.version.outputs.version }}-pre
        run: |
          node -e "const fs=require('fs');const f='package.json';let s=fs.readFileSync(f,'utf8');s=s.replace(/\"version\":\s*\"[^\"]+\"/,'\"version\": \"'+process.env.PREVERSION+'\"');fs.writeFileSync(f,s)"
          echo "Frontend pre-release version: $PREVERSION"

      - name: Build and push pre-release image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:v${{ steps.version.outputs.version }}-pre
            ghcr.io/${{ github.repository }}:preview
          build-args: |
            VERSION=${{ steps.version.outputs.version }}-pre
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Write pre-release summary
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "## Pre-release image ready: v$VERSION"
            echo ""
            echo "Install and test before approving the release:"
            echo ""
            echo '```bash'
            echo "docker pull $IMAGE:v$VERSION-pre"
            echo "# or: docker pull $IMAGE:preview"
            echo '```'
            echo ""
            echo "If it works, **approve** the \`prerelease-approval\` gate on the"
            echo "*Assemble Changelog* job to continue the release. Reject to abort"
            echo "(nothing has been committed yet)."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Step 1: assemble changelog + bump versions (no push to main yet) ──────
  assemble:
    name: Assemble Changelog
    runs-on: ubuntu-latest
    needs: prerelease
    environment: prerelease-approval
    permissions:
      contents: write
    outputs:
      version: ${{ steps.release.outputs.version }}
      has_code_changes: ${{ steps.code_check.outputs.has_changes }}
      release_branch: ${{ steps.branch.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: preview
          fetch-depth: 0
          token: ${{ secrets.RELEASE_SECRET }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Check fragments exist
        run: |
          count=$(find changelogs/unreleased -name "*.md" ! -name "README.md" | wc -l | tr -d ' ')
          if [ "$count" = "0" ]; then
            echo "No changelog fragments found. Nothing to release."
            exit 1
          fi
          echo "Found $count fragment(s)."

      - name: Guard against manual edits to managed files
        run: |
          ERRORS=""

          # CHANGELOG.md must have an empty ## [Unreleased] section
          # (any content there means someone edited it manually)
          UNRELEASED_CONTENT=$(awk '
            /^## \[Unreleased\]/ { found=1; next }
            found && /^## \[v/ { exit }
            found && /[^[:space:]]/ { print }
          ' CHANGELOG.md)
          if [ -n "$UNRELEASED_CONTENT" ]; then
            ERRORS="$ERRORS\n  - CHANGELOG.md has manual content under ## [Unreleased]. Use a fragment file instead."
          fi

          # All three package.json versions must be in sync
          V1=$(node -p "require('./package.json').version")
          V2=$(node -p "require('./packages/server/package.json').version")
          V3=$(node -p "require('./docs/portfolio/package.json').version")
          if [ "$V1" != "$V2" ] || [ "$V1" != "$V3" ]; then
            ERRORS="$ERRORS\n  - package.json versions are out of sync: root=$V1 server=$V2 portfolio=$V3. Align them before releasing."
          fi

          if [ -n "$ERRORS" ]; then
            echo -e "Release blocked due to manual changes:\n$ERRORS"
            exit 1
          fi
          echo "Guards passed — managed files are clean."

      - name: Run release script
        id: release
        run: |
          bun run scripts/release.ts ${{ inputs.version }}
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Assembled version: $VERSION"

      - name: Trim CHANGELOG to latest 10 releases
        run: |
          COUNT_BEFORE=$(grep -c '^## \[v' CHANGELOG.md || true)
          awk '
            /^## \[v/ { count++ }
            count > 10 { next }
            { print }
          ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md
          COUNT_AFTER=$(grep -c '^## \[v' CHANGELOG.md || true)
          echo "CHANGELOG entries: $COUNT_BEFORE before → $COUNT_AFTER after (kept latest 10)"

      - name: Check for code changes since last tag
        id: code_check
        run: |
          LAST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found — treating as first release."
            echo "has_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Comparing against last tag: $LAST_TAG"
          CODE=$(git diff --name-only "$LAST_TAG" HEAD \
            | grep -E '^(src/|packages/server/src/)' || true)
          if [ -n "$CODE" ]; then
            echo "Code changes detected:"
            echo "$CODE"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No code changes since $LAST_TAG — Docker/tag/release will be skipped."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit to release branch (not main)
        id: branch
        if: steps.code_check.outputs.has_changes == 'true'
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          BRANCH="release/v$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin preview
          git checkout -b "$BRANCH" origin/preview
          git add \
            CHANGELOG.md \
            package.json \
            packages/server/package.json \
            docs/portfolio/package.json \
            changelogs/unreleased/
          git commit -m "chore: release v$VERSION"
          git push origin "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT
          echo "Pushed assembled changes to $BRANCH — awaiting approval before merging to main."

      - name: Skip — no code changes
        if: steps.code_check.outputs.has_changes == 'false'
        run: |
          echo "No changes in src/ or packages/server/src/ since last release."
          echo "Skipping push, Docker build, and publish."
          echo "Fragments remain in changelogs/unreleased/ for the next real release."

      - name: Write release summary
        if: steps.code_check.outputs.has_changes == 'true'
        run: |
          VERSION="v${{ steps.release.outputs.version }}"
          BRANCH="${{ steps.branch.outputs.name }}"
          ENTRY_COUNT=$(grep -c '^## \[v' CHANGELOG.md || true)
          {
            echo "## Release Preview: $VERSION"
            echo ""
            echo "> Changelog and version bump are staged on \`$BRANCH\`."
            echo "> **Approve** the \`docker-publish\` deployment below to push to \`main\` and build Docker, or **Reject** to abort (the release branch will be deleted automatically)."
            echo ""
            echo "---"
            echo ""
            # Extract notes for this version from the assembled CHANGELOG.md
            awk -v tag="[$VERSION]" '
              /^## \[v/ {
                if (found) exit
                if (index($0, tag) > 0) { found=1; next }
              }
              found { print }
            ' CHANGELOG.md
            echo ""
            echo "---"
            echo ""
            echo "<details>"
            echo "<summary>Full retained CHANGELOG ($ENTRY_COUNT entries — click to expand)</summary>"
            echo ""
            echo '```markdown'
            # Print all versioned sections (skip the preamble header lines)
            awk '/^## \[v/{found=1} found{print}' CHANGELOG.md
            echo '```'
            echo ""
            echo "</details>"
          } >> $GITHUB_STEP_SUMMARY

  # ── Step 2: approval gate — push assembled changes to main ────────────────
  push-to-main:
    name: Push to Main
    needs: assemble
    if: needs.assemble.outputs.has_code_changes == 'true'
    runs-on: ubuntu-latest
    environment: release-approval
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_SECRET }}

      - name: Fast-forward main to release branch
        run: |
          BRANCH="${{ needs.assemble.outputs.release_branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git push origin "HEAD:main"
          echo "main updated to v${{ needs.assemble.outputs.version }}"

      - name: Delete release branch
        run: |
          git push origin --delete "${{ needs.assemble.outputs.release_branch }}" || true

  # ── Step 2b: cleanup on rejection — delete the release branch ───────────────
  cleanup-on-rejection:
    name: Cleanup Release Branch
    needs: [assemble, push-to-main]
    if: failure() && needs.assemble.outputs.release_branch != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_SECRET }}

      - name: Delete release branch
        run: |
          BRANCH="${{ needs.assemble.outputs.release_branch }}"
          git push origin --delete "$BRANCH" || echo "Branch $BRANCH already deleted or not found."
          echo "Release branch $BRANCH deleted after rejection."

  # ── Step 3: build and push Docker (after main is updated) ─────────────────
  docker:
    name: Build & Push Docker
    needs: [push-to-main, assemble]
    runs-on: ubuntu-latest
    environment: docker-publish
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ needs.assemble.outputs.version }}
            type=raw,value=${{ needs.assemble.outputs.version }}

      # Rebuild from the bumped main so the frontend bundle carries the real
      # release version (the pre-release image carries v<version>-pre).
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.assemble.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ── Step 4 (parallel, after Docker succeeds): publish tag + GitHub Release ─
  publish:
    name: Publish Tag & Release
    needs: [docker, assemble]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Create and push tag
        env:
          VERSION: v${{ needs.assemble.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "$VERSION" | grep -q "refs/tags/$VERSION"; then
            echo "Tag $VERSION already exists — skipping."
            exit 0
          fi
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
          echo "Tag $VERSION created."

      - name: Extract release notes
        env:
          VERSION: v${{ needs.assemble.outputs.version }}
        run: |
          awk -v tag="[$VERSION]" '
            /^## \[v/ {
              if (found) exit
              if (index($0, tag) > 0) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "Release notes:"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.assemble.outputs.version }}
          name: v${{ needs.assemble.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          generate_release_notes: false

      - name: Get repository and category IDs
        id: get_ids
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          REPO_ID=$(gh api graphql \
            -f query="{ repository(owner: \"$REPO_OWNER\", name: \"$REPO_NAME\") { id } }" \
            -q '.data.repository.id')
          CATEGORY_ID=$(gh api graphql \
            -f query="{ repository(owner: \"$REPO_OWNER\", name: \"$REPO_NAME\") { discussionCategories(first: 10) { nodes { id name } } } }" \
            -q '.data.repository.discussionCategories.nodes[] | select(.name == "Announcements") | .id')
          echo "repository_id=$REPO_ID" >> $GITHUB_OUTPUT
          echo "category_id=$CATEGORY_ID" >> $GITHUB_OUTPUT

      - name: Create release announcement discussion
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: v${{ needs.assemble.outputs.version }}
          REPO_ID: ${{ steps.get_ids.outputs.repository_id }}
          CATEGORY_ID: ${{ steps.get_ids.outputs.category_id }}
        run: |
          {
            echo "# 🎉 CHouse UI $VERSION Released!"
            echo ""
            echo "We're excited to announce the release of **CHouse UI $VERSION**!"
            echo ""
            echo "## What's New"
            echo ""
            cat RELEASE_NOTES.md
            echo ""
            echo "## 📦 Installation"
            echo ""
            echo '```bash'
            echo "docker pull ghcr.io/$REPO:$VERSION"
            echo '```'
            echo ""
            echo "## 🔗 Resources"
            echo ""
            echo "- **Release Notes**: https://github.com/$REPO/releases/tag/$VERSION"
            echo "- **Repository**: https://github.com/$REPO"
          } > ANNOUNCEMENT.md
          cat ANNOUNCEMENT.md | gh api graphql \
            --field query="mutation(\$body: String!) { createDiscussion(input: { repositoryId: \"$REPO_ID\", categoryId: \"$CATEGORY_ID\", title: \"CHouse UI $VERSION Released!\", body: \$body }) { discussion { id url } } }" \
            --field body=@-

  # ── Step 4 (parallel, after Docker succeeds): deploy docs ─────────────────
  deploy-docs:
    name: Deploy Docs
    needs: [docker, assemble]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Sync changelog to portfolio
        run: cp CHANGELOG.md docs/portfolio/public/CHANGELOG.md

      - name: Install dependencies
        working-directory: docs/portfolio
        run: bun install

      - name: Build portfolio
        working-directory: docs/portfolio
        env:
          NODE_ENV: production
          VITE_BASE_PATH: /
        run: bun run build --mode production

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/portfolio/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
