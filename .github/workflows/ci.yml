name: CI

on:
  pull_request:
    branches:
      - preview

# Cancel in-progress runs when a new commit is pushed to the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies (Root)
        run: bun install

      - name: Install Dependencies (Server)
        run: cd packages/server && bun install

      - name: Lint Frontend
        run: bun run lint

      - name: Type Check Frontend
        run: bun run tsc --noEmit

      - name: Type Check Server
        working-directory: ./packages/server
        run: bun run typecheck

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      pull-requests: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies (Server)
        working-directory: ./packages/server
        run: bun install

      - name: Run Server Tests (Isolated)
        run: ./scripts/test-isolated-server.sh

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      pull-requests: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Run Frontend Tests
        run: bunx vitest run src/api src/lib src/helpers src/hooks src/stores src/utils --run --exclude '**/packages/**'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      pull-requests: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Frontend
        run: bun run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      pull-requests: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check for Code Changes
        id: check_changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # For PRs, compare with the base branch
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
            
            # Fetch base branch to ensure we can compare
            git fetch origin $BASE_REF:$BASE_REF 2>/dev/null || true
          else
            # For pushes, compare with the base commit
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            
            # If base SHA is invalid, check last commit
            if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA=$(git rev-parse HEAD~1)
            fi
          fi
          
          # Get all changed files
          CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA 2>/dev/null || true)
          
          # Filter out non-code files
          # Keep only: src/, packages/, Dockerfile, package.json, bun.lock, tsconfig.json, etc.
          # Exclude: .rules/, docs/, CHANGELOG.md, README.md, LICENSE, NOTICE
          CODE_CHANGES=$(echo "$CHANGED_FILES" | grep -E '^(src/|packages/|Dockerfile|package\.json|bun\.lock|tsconfig\.json|vite\.config|\.env\.example)' || true)
          
          if [ -z "$CODE_CHANGES" ]; then
            echo "No code changes detected. Only documentation/metadata files changed."
            echo "Changed files were:"
            echo "$CHANGED_FILES"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Code changes detected:"
            echo "$CODE_CHANGES"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Test)
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: chouseui:test
          build-args: |
            VERSION=test
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate-changelog:
    name: Validate Changelog Fragment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md was not manually edited
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -q '^CHANGELOG\.md$'; then
            echo "Error: CHANGELOG.md must not be edited manually."
            echo "Drop a fragment file in changelogs/unreleased/ instead."
            exit 1
          fi
          echo "✓ CHANGELOG.md not touched."

      - name: Check package.json versions were not manually bumped
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"

          ERRORS=""
          for PKG in package.json packages/server/package.json docs/portfolio/package.json; do
            CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -q "^${PKG}$" && echo "yes" || echo "no")
            if [ "$CHANGED" = "yes" ]; then
              BASE_VER=$(git show "$BASE_SHA:$PKG" | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "")
              HEAD_VER=$(node -p "require('./$PKG').version")
              if [ "$BASE_VER" != "$HEAD_VER" ]; then
                ERRORS="$ERRORS\n  - $PKG: version was manually changed ($BASE_VER → $HEAD_VER). Version bumps are handled automatically by the release workflow."
              fi
            fi
          done

          if [ -n "$ERRORS" ]; then
            echo -e "package.json version check failed:\n$ERRORS"
            exit 1
          fi
          echo "✓ No manual version bumps detected."

      - name: Validate fragment files
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"

          # Find fragment files added or modified in this PR
          FRAGMENTS=$(git diff --name-only --diff-filter=AM "$BASE_SHA" "$HEAD_SHA" \
            | grep '^changelogs/unreleased/.*\.md$' \
            | grep -v 'README\.md' || true)

          if [ -z "$FRAGMENTS" ]; then
            echo "No fragment files in this PR — skipping validation."
            exit 0
          fi

          ERRORS=""
          for FILE in $FRAGMENTS; do
            FIRST_LINE=$(head -1 "$FILE")
            if ! echo "$FIRST_LINE" | grep -qE '^type: (major|minor|patch)$'; then
              ERRORS="$ERRORS\n  - $FILE: first line must be 'type: major|minor|patch' (got: '$FIRST_LINE')"
              continue
            fi
            if ! grep -qE '^### (Added|Changed|Fixed|Removed)' "$FILE"; then
              ERRORS="$ERRORS\n  - $FILE: must contain at least one section (### Added / Changed / Fixed / Removed)"
            fi
          done

          if [ -n "$ERRORS" ]; then
            echo -e "Fragment validation failed:\n$ERRORS"
            exit 1
          fi
          echo "✓ All fragment files are valid: $FRAGMENTS"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Grype vulnerability scanner
        run: grype dir:. --fail-on high
